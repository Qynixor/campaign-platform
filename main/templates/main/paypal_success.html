{% extends 'base.html' %}
{% load static %}

{% block title %}Payment Successful | Rallynex{% endblock %}

{% block content %}
<div class="container" style="max-width:600px;margin:60px auto;text-align:center;padding:40px 20px;">
    <div style="font-size:72px;color:#10b981;margin-bottom:16px;">
        <i class="fas fa-check-circle"></i>
    </div>
    <h1 style="font-size:28px;font-weight:700;color:var(--text-primary);">Payment Successful! 🎉</h1>
    <p style="font-size:16px;color:var(--text-secondary);margin-bottom:24px;">
        Your payment has been processed successfully.
    </p>
    <a href="{% url 'subscription_dashboard' %}" class="btn btn-primary" style="padding:12px 32px;border-radius:12px;background:var(--accent);color:#fff;text-decoration:none;">
        <i class="fas fa-credit-card"></i> Go to Billing
    </a>
</div>
{% endblock %}
