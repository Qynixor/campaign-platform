{% extends 'base.html' %}
{% load static %}

{% block title %}Payment Cancelled | Rallynex{% endblock %}

{% block content %}
<div class="container" style="max-width:600px;margin:60px auto;text-align:center;padding:40px 20px;">
    <div style="font-size:72px;color:#f59e0b;margin-bottom:16px;">
        <i class="fas fa-exclamation-circle"></i>
    </div>
    <h1 style="font-size:28px;font-weight:700;color:var(--text-primary);">Payment Cancelled</h1>
    <p style="font-size:16px;color:var(--text-secondary);margin-bottom:24px;">
        You cancelled the payment. No charges were made.
    </p>
    <a href="{% url 'subscription_plans' %}" class="btn btn-outline" style="padding:12px 32px;border-radius:12px;border:1px solid var(--border-color);color:var(--text-primary);text-decoration:none;">
        <i class="fas fa-arrow-left"></i> Back to Plans
    </a>
</div>
{% endblock %}
