{% extends 'base.html' %}
{% load static %}

{% block content %}
<div style="max-width: 600px; margin: 60px auto; text-align: center; padding: 40px; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border-color);">
    <div style="font-size: 64px; margin-bottom: 20px;">🎉</div>
    <h1 style="color: var(--text-primary); margin-bottom: 12px;">Subscription Successful!</h1>
    <p style="color: var(--text-secondary); font-size: 18px; margin-bottom: 8px;">
        You're now subscribed to Rallynex Plus!
    </p>
    <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 30px;">
        Your premium features are now active.
    </p>
    
    <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
        <a href="{% url 'dashboard' %}" style="padding: 12px 24px; background: var(--accent); color: #fff; border-radius: 8px; text-decoration: none;">
            Go to Dashboard
        </a>
        <a href="{% url 'subscription_plans' %}" style="padding: 12px 24px; background: transparent; border: 1px solid var(--border-color); border-radius: 8px; text-decoration: none; color: var(--text-primary);">
            View Plans
        </a>
    </div>
</div>
{% endblock %}
