<!-- templates/main/comments_partial.html -->
{% for comment in comments %}
<div class="comment-item">
    <img src="{% if comment.user.profile_image %}{{ comment.user.profile_image }}{% else %}https://res.cloudinary.com/dvlgdzood/image/upload/v1763637368/pp_vvzbcj.jpg{% endif %}" class="comment-avatar">
    <div class="comment-content">
        <div class="comment-header">
            <span class="comment-username">@{{ comment.user.username }}</span>
            {% if comment.user.verified %}
                <i class="fas fa-check-circle" style="color: #1DA1F2; font-size: 12px;"></i>
            {% endif %}
            <span class="comment-time">{{ comment.time_ago }}</span>
        </div>
        <div class="comment-text">{{ comment.text }}</div>
    </div>
</div>
{% empty %}
<div style="text-align: center; color: #888; padding: 30px 20px;">
    No comments yet. Be the first to comment!
</div>
{% endfor %}
