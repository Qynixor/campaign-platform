<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cause Journey · Reel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        :root {
            --twitter-blue: #1DA1F2;
        }

        .reel-demo {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            max-height: 932px;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        /* Slideshow */
        .reel-slideshow {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
        }

        .slides-track {
            display: flex;
            height: 100%;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .slide {
            min-width: 100%;
            height: 100%;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gradient-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 180px;
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
            z-index: 5;
            pointer-events: none;
        }

        .gradient-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 350px;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
            z-index: 5;
            pointer-events: none;
        }

        /* Top Bar – now includes back arrow on left */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 50px 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%);
        }

        /* left group: back arrow + stats icon */
        .left-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* BACK ARROW (new) */
        .back-arrow {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            cursor: pointer;
            border: 1.5px solid rgba(255,255,255,0.3);
            transition: all 0.2s;
            backdrop-filter: blur(2px);
        }

        .back-arrow:active {
            background: rgba(255,255,255,0.3);
            transform: scale(0.95);
        }

        /* Stats Icon */
        .stats-icon {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            border: 1.5px solid rgba(255,255,255,0.3);
            position: relative;
            z-index: 100;
            backdrop-filter: blur(2px);
        }

        .stats-popup {
            position: absolute;
            top: 60px;
            left: 0;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 20px;
            width: 280px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            z-index: 999999;
            pointer-events: none;
        }

        .stats-popup.active {
            opacity: 1;
            visibility: visible;
            pointer-events: all;
        }

        .stats-popup h3 {
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-popup h3 i {
            color: var(--twitter-blue);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--twitter-blue);
            display: block;
        }

        .stat-label {
            font-size: 11px;
            color: #aaa;
        }

        /* Right Group */
        .right-group {
            display: flex;
            align-items: center;
            position: relative;
            z-index: 1000;
        }

        /* Menu Container */
        .menu-container {
            position: relative;
        }

        /* Menu Dots */
        .menu-dots {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            border: 1.5px solid rgba(255,255,255,0.3);
            position: relative;
            z-index: 100;
            backdrop-filter: blur(2px);
        }

        /* Menu Dropdown */
        .menu-dropdown {
            position: fixed;
            top: 110px;
            right: 16px;
            background: #1a1a1a;
            border-radius: 16px;
            padding: 8px;
            width: 220px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            z-index: 999999;
            pointer-events: none;
        }

        .menu-dropdown.active {
            opacity: 1;
            visibility: visible;
            pointer-events: all;
        }

        .menu-item {
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            border: none;
            background: transparent;
            text-align: left;
        }

        .menu-item:hover {
            background: #333;
        }

        .menu-item:active {
            background: #444;
        }

        .menu-item i {
            width: 22px;
            color: var(--twitter-blue);
            font-size: 18px;
        }

        /* Audio Icon */
        .audio-icon {
            position: absolute;
            top: 120px;
            right: 16px;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            border: 1.5px solid rgba(255,255,255,0.3);
            z-index: 15;
            backdrop-filter: blur(2px);
        }

        .audio-icon.playing {
            background: var(--twitter-blue);
        }

        /* Carousel Dots */
        .carousel-dots {
            position: absolute;
            top: 180px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 15;
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
        }

        .dot {
            width: 24px;
            height: 3px;
            background: rgba(255,255,255,0.4);
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: var(--twitter-blue);
            width: 32px;
        }

        /* Explore Icon */
        .explore-section {
            position: absolute;
            bottom: 100px;
            right: 80px;
            z-index: 25;
        }

        .explore-icon {
            width: 52px;
            height: 52px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 22px;
            transition: all 0.2s;
            backdrop-filter: blur(2px);
        }

        .explore-icon:hover {
            background: var(--twitter-blue);
        }

        /* Action Buttons */
        .action-buttons {
            position: absolute;
            right: 12px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            z-index: 20;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: white;
            background: none;
            border: none;
            cursor: pointer;
            min-width: 60px;
            transition: all 0.2s;
        }

        .action-btn i {
            font-size: 28px;
            color: white;
            transition: all 0.2s;
        }

        .action-btn span {
            font-size: 12px;
            font-weight: 600;
            color: white;
        }

        .action-profile {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 3px solid var(--twitter-blue);
            object-fit: cover;
        }

        .action-btn.follow-btn i {
            color: var(--twitter-blue);
        }

        .action-btn.follow-btn.following i {
            color: #4CAF50;
        }

        .action-btn.loved i {
            color: #ff3b30;
        }

        /* Info Panel */
        .info-panel {
            position: absolute;
            bottom: 30px;
            left: 16px;
            right: 80px;
            z-index: 20;
            color: white;
        }

        .username-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

        .username {
            font-weight: 700;
            font-size: 16px;
            color: white;
            text-decoration: none;
        }

        .verified {
            color: var(--twitter-blue);
            font-size: 14px;
        }

        .timestamp {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
        }

        .caption {
            font-size: 15px;
            line-height: 1.4;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: all 0.3s;
        }

        .caption.expanded {
            -webkit-line-clamp: unset;
        }

        .more-link {
            font-size: 13px;
            font-weight: 600;
            color: var(--twitter-blue);
            cursor: pointer;
            display: inline-block;
            margin-bottom: 8px;
        }

        .meta-row {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 10px;
        }

        .meta-row i {
            margin-right: 4px;
            color: var(--twitter-blue);
        }

        .media-counter {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            width: fit-content;
            margin: 10px 0 5px;
            backdrop-filter: blur(4px);
        }

        /* Thumbnail Strip - Improved */
        .thumbnail-strip {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            overflow-x: auto;
            padding: 4px 0;
            scrollbar-width: none;
            -ms-overflow-style: none;
            scroll-behavior: smooth;
        }

        .thumbnail-strip::-webkit-scrollbar {
            display: none;
        }

        .thumbnail-item {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid transparent;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
            opacity: 0.7;
        }

        .thumbnail-item:hover {
            opacity: 1;
            transform: scale(1.05);
        }

        .thumbnail-item.active {
            border-color: var(--twitter-blue);
            opacity: 1;
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(29, 161, 242, 0.5);
        }

        .thumbnail-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slide-counter {
            display: inline-flex;
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin-top: 8px;
            align-items: center;
            gap: 4px;
            backdrop-filter: blur(4px);
        }

        .slide-counter i {
            color: var(--twitter-blue);
            font-size: 10px;
        }

        /* Backdrop */
        .popup-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999990;
            display: none;
        }

        .popup-backdrop.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="popup-backdrop" id="popupBackdrop" onclick="closeAllPopups()"></div>

    <div class="reel-demo">
        <div class="reel-slideshow">
            <div class="slides-track" id="slidesTrack">
                <div class="slide"><img src="https://images.unsplash.com/photo-1469571486292-0ba58a3f068b?w=600&h=1200&fit=crop" alt="Slide 1"></div>
                <div class="slide"><img src="https://images.unsplash.com/photo-1593113598335-c28859f6a0a6?w=600&h=1200&fit=crop" alt="Slide 2"></div>
                <div class="slide"><img src="https://images.unsplash.com/photo-1488521787991-56cbf2c6d5e7?w=600&h=1200&fit=crop" alt="Slide 3"></div>
            </div>
        </div>

        <div class="gradient-top"></div>
        <div class="gradient-bottom"></div>

        <!-- TOP BAR with BACK ARROW added -->
        <div class="top-bar">
            <!-- left side: back arrow + stats -->
            <div class="left-group">
                <!-- BACK ARROW (added here) -->
                <div class="back-arrow" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i>
                </div>

                <!-- stats icon with popup -->
                <div style="position: relative;">
                    <div class="stats-icon" onclick="toggleStats(event)">
                        <i class="fas fa-chart-bar"></i>
                    </div>
                    <div class="stats-popup" id="statsPopup" onclick="event.stopPropagation()">
                        <h3><i class="fas fa-chart-pie"></i> Journey Stats</h3>
                        <div class="stats-grid">
                            <div class="stat-item"><span class="stat-value">1.2K</span><span class="stat-label">Supporters</span></div>
                            <div class="stat-item"><span class="stat-value">$45K</span><span class="stat-label">Raised</span></div>
                            <div class="stat-item"><span class="stat-value">28</span><span class="stat-label">Activities</span></div>
                            <div class="stat-item"><span class="stat-value">12</span><span class="stat-label">Days Left</span></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- right side unchanged -->
            <div class="right-group">
                <div class="menu-container">
                    <div class="menu-dots" onclick="toggleMenu(event)">
                        <i class="fas fa-ellipsis"></i>
                    </div>
                    <div class="menu-dropdown" id="menuDropdown" onclick="event.stopPropagation()">
                        <a href="#" class="menu-item" onclick="handleMenuItemClick(event, 'Activities')">
                            <i class="fas fa-tasks"></i> Activities
                        </a>
                        <a href="#" class="menu-item" onclick="handleMenuItemClick(event, 'Top Supporters')">
                            <i class="fas fa-trophy"></i> Top Supporters
                        </a>
                        <a href="#" class="menu-item" onclick="handleMenuItemClick(event, 'Sound Tribe')">
                            <i class="fas fa-headphones"></i> Sound Tribe
                        </a>
                        <a href="#" class="menu-item" onclick="handleMenuItemClick(event, 'Report')">
                            <i class="fas fa-flag"></i> Report
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="audio-icon" id="audioIcon" onclick="toggleAudio(event)">
            <i class="fas fa-music"></i>
        </div>

        <div class="carousel-dots">
            <button class="dot active" onclick="goToSlide(0)"></button>
            <button class="dot" onclick="goToSlide(1)"></button>
            <button class="dot" onclick="goToSlide(2)"></button>
        </div>

        <div class="explore-section">
            <div class="explore-icon" onclick="viewJourney()">
                <i class="fas fa-compass"></i>
            </div>
        </div>

        <div class="action-buttons">
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&h=100&fit=crop" class="action-profile" alt="Profile">
            <button class="action-btn" onclick="toggleLove(this)"><i class="far fa-heart"></i><span>1.2K</span></button>
            <button class="action-btn" onclick="openComments()"><i class="far fa-comment"></i><span>89</span></button>
            <button class="action-btn follow-btn" id="followBtn" onclick="toggleFollow(this)"><i class="fas fa-plus"></i><span>Follow</span></button>
            <button class="action-btn" onclick="openShare()"><i class="fas fa-share-alt"></i><span></span></button>
        </div>

        <div class="info-panel">
            <div class="username-row">
                <a href="#" class="username">@sarah.johnson</a>
                <i class="fas fa-check-circle verified"></i>
                <span class="timestamp">• 2h ago</span>
            </div>
            <div class="caption" id="caption">Building sustainable water wells for communities in need. Every drop counts.</div>
            <span class="more-link" onclick="toggleCaption()">more</span>
            <div class="meta-row">
                <span><i class="fas fa-map-pin"></i> Nairobi, Kenya</span>
                <span><i class="fas fa-calendar"></i> Day 5 of 30</span>
            </div>
            <div class="media-counter"><i class="fas fa-images"></i><span>12 photos</span></div>
            <div class="thumbnail-strip" id="thumbnailStrip">
                <div class="thumbnail-item active" onclick="goToSlide(0)" data-index="0">
                    <img src="https://images.unsplash.com/photo-1469571486292-0ba58a3f068b?w=100&h=100&fit=crop" alt="thumb 1">
                </div>
                <div class="thumbnail-item" onclick="goToSlide(1)" data-index="1">
                    <img src="https://images.unsplash.com/photo-1593113598335-c28859f6a0a6?w=100&h=100&fit=crop" alt="thumb 2">
                </div>
                <div class="thumbnail-item" onclick="goToSlide(2)" data-index="2">
                    <img src="https://images.unsplash.com/photo-1488521787991-56cbf2c6d5e7?w=100&h=100&fit=crop" alt="thumb 3">
                </div>
            </div>
            <div class="slide-counter">
                <i class="fas fa-image"></i>
                <span id="currentSlide">1</span> / <span id="totalSlides">3</span>
            </div>
        </div>

        <audio class="bg-audio" id="bgAudio" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        const track = document.getElementById('slidesTrack');
        const thumbnailItems = document.querySelectorAll('.thumbnail-item');
        const totalSlides = slides.length;
        
        // Set total slides
        document.getElementById('totalSlides').textContent = totalSlides;

        function updateSlides() {
            // Update slide track
            track.style.transform = `translateX(-${currentSlide * 100}%)`;
            
            // Update dots
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentSlide);
            });
            
            // Update thumbnails
            thumbnailItems.forEach((thumb, i) => {
                thumb.classList.toggle('active', i === currentSlide);
            });
            
            // Update slide counter
            document.getElementById('currentSlide').textContent = currentSlide + 1;
            
            // Scroll active thumbnail into view
            const activeThumb = document.querySelector('.thumbnail-item.active');
            if (activeThumb) {
                activeThumb.scrollIntoView({
                    behavior: 'smooth',
                    block: 'nearest',
                    inline: 'center'
                });
            }
        }

        function goToSlide(index) {
            if (index >= 0 && index < totalSlides) {
                currentSlide = index;
                updateSlides();
            }
        }

        // Auto advance slides
        let autoAdvance = setInterval(() => {
            currentSlide = (currentSlide + 1) % totalSlides;
            updateSlides();
        }, 4000);

        // Pause auto-advance when interacting with thumbnails
        thumbnailItems.forEach(thumb => {
            thumb.addEventListener('click', () => {
                clearInterval(autoAdvance);
                autoAdvance = setInterval(() => {
                    currentSlide = (currentSlide + 1) % totalSlides;
                    updateSlides();
                }, 4000);
            });
        });

        // ----- BACK ARROW FUNCTION (new) -----
        function goBack() {
            alert('← Back navigation (simulated)');
            // In a real app you might use: window.history.back() or similar
        }

        function toggleStats(event) {
            event.stopPropagation();
            const statsPopup = document.getElementById('statsPopup');
            const backdrop = document.getElementById('popupBackdrop');
            
            statsPopup.classList.toggle('active');
            backdrop.classList.toggle('active');
            document.getElementById('menuDropdown').classList.remove('active');
        }

        function toggleMenu(event) {
            event.stopPropagation();
            const menuDropdown = document.getElementById('menuDropdown');
            const backdrop = document.getElementById('popupBackdrop');
            
            menuDropdown.classList.toggle('active');
            backdrop.classList.toggle('active');
            document.getElementById('statsPopup').classList.remove('active');
        }

        function closeAllPopups() {
            document.getElementById('statsPopup').classList.remove('active');
            document.getElementById('menuDropdown').classList.remove('active');
            document.getElementById('popupBackdrop').classList.remove('active');
        }

        function handleMenuItemClick(event, itemName) {
            event.preventDefault();
            event.stopPropagation();
            alert(`Clicked: ${itemName}`);
            closeAllPopups();
        }

        function toggleFollow(btn) {
            btn.classList.toggle('following');
            btn.innerHTML = btn.classList.contains('following') ? 
                '<i class="fas fa-check"></i><span>Following</span>' : 
                '<i class="fas fa-plus"></i><span>Follow</span>';
        }

        const audio = document.getElementById('bgAudio');
        const audioIcon = document.getElementById('audioIcon');
        
        function toggleAudio(event) {
            event.stopPropagation();
            if (audio.paused) { 
                audio.play(); 
                audioIcon.classList.add('playing'); 
                audioIcon.innerHTML = '<i class="fas fa-pause"></i>'; 
            } else { 
                audio.pause(); 
                audioIcon.classList.remove('playing'); 
                audioIcon.innerHTML = '<i class="fas fa-music"></i>'; 
            }
        }

        function toggleLove(btn) {
            btn.classList.toggle('loved');
            const count = btn.querySelector('span');
            if (btn.classList.contains('loved')) {
                count.textContent = '1.3K';
                btn.querySelector('i').className = 'fas fa-heart';
            } else {
                count.textContent = '1.2K';
                btn.querySelector('i').className = 'far fa-heart';
            }
        }

        function toggleCaption() { 
            document.getElementById('caption').classList.toggle('expanded'); 
        }
        
        function viewJourney() { 
            alert('Journey page'); 
        }
        
        function openComments() { 
            alert('Comments'); 
        }
        
        function openShare() { 
            alert('Share'); 
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                goToSlide(currentSlide - 1);
            } else if (e.key === 'ArrowRight') {
                goToSlide(currentSlide + 1);
            }
        });

        // Touch navigation
        let touchStartX = 0;
        let touchEndX = 0;
        
        document.querySelector('.reel-demo').addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, false);
        
        document.querySelector('.reel-demo').addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, false);
        
        function handleSwipe() {
            const swipeThreshold = 50;
            if (touchEndX < touchStartX - swipeThreshold) {
                // Swipe left
                goToSlide(currentSlide + 1);
            }
            if (touchEndX > touchStartX + swipeThreshold) {
                // Swipe right
                goToSlide(currentSlide - 1);
            }
        }

        // Close popups when clicking outside (enhanced)
        document.addEventListener('click', function(event) {
            const menuDropdown = document.getElementById('menuDropdown');
            const menuDots = document.querySelector('.menu-dots');
            const statsPopup = document.getElementById('statsPopup');
            const statsIcon = document.querySelector('.stats-icon');
            
            if (!menuDropdown.contains(event.target) && !menuDots.contains(event.target)) {
                menuDropdown.classList.remove('active');
            }
            
            if (!statsPopup.contains(event.target) && !statsIcon.contains(event.target)) {
                statsPopup.classList.remove('active');
            }
            
            if (!menuDropdown.classList.contains('active') && !statsPopup.classList.contains('active')) {
                document.getElementById('popupBackdrop').classList.remove('active');
            }
        });

        // Initialize
        updateSlides();
    </script>
</body>
