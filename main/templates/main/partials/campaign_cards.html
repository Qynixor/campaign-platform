{% for campaign in campaigns %}
    {% include "main/partials/campaign_card.html" %}
{% endfor %}

<!-- Load more trigger -->
{% if offset < total_campaigns %}
<div hx-get="{% url 'journey' %}?load-more=true&offset={{ offset }}"
     hx-trigger="revealed"
     hx-target="#campaigns-container"
     hx-swap="beforeend"
     hx-indicator="#loading-spinner">
    <div style="height: 20px; text-align: center; color: white; padding: 20px;">
        <i class="fas fa-spinner fa-spin"></i> Loading more...
    </div>
</div>
{% endif %}
