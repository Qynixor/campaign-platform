<div style="padding: 20px;">
    <h3 style="color: white;">Analytics</h3>
    
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px;">
        <div style="background: #222; padding: 15px; border-radius: 8px;">
            <div style="color: #aaa;">Total Impressions</div>
            <div style="color: #4CAF50; font-size: 24px; font-weight: bold;">{{ total_impressions|default:"0" }}</div>
        </div>
        <div style="background: #222; padding: 15px; border-radius: 8px;">
            <div style="color: #aaa;">Total Clicks</div>
            <div style="color: #ff6b6b; font-size: 24px; font-weight: bold;">{{ total_clicks|default:"0" }}</div>
        </div>
        <div style="background: #222; padding: 15px; border-radius: 8px;">
            <div style="color: #aaa;">CTR</div>
            <div style="color: #4ecdc4; font-size: 24px; font-weight: bold;">{{ ctr|floatformat:1|default:"0" }}%</div>
        </div>
    </div>
</div>
