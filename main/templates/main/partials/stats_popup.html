<div class="stats-grid">
    <div class="stat-item">
        <span class="stat-value">{{ campaign.get_follower_count }}</span>
        <span class="stat-label">Supporters</span>
    </div>
    <div class="stat-item">
        <span class="stat-value">{{ campaign.get_love_count }}</span>
        <span class="stat-label">Loves</span>
    </div>
    <div class="stat-item">
        <span class="stat-value">{{ campaign.get_comment_count }}</span>
        <span class="stat-label">Comments</span>
    </div>
    <div class="stat-item">
        <span class="stat-value">Day {{ campaign.get_current_day_display.current }}</span>
        <span class="stat-label">of {{ campaign.get_current_day_display.total }}</span>
    </div>
</div>
