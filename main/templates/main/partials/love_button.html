<button class="action-btn {% if user_loved %}loved{% endif %}" 
        hx-post="{% url 'htmx_toggle_love' campaign.id %}"
        hx-target="#love-container-{{ campaign.id }}"
        hx-swap="outerHTML"
        hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <i class="{% if user_loved %}fas{% else %}far{% endif %} fa-heart"></i>
    <span>{{ love_count }}</span>
</button>
