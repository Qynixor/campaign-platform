{% if already_exists %}
<div class="menu-item" style="background: #2a2a2a; color: white;">
    <i class="fas fa-info-circle"></i> You already started this journey
    <a href="{{ redirect_url }}" style="display: block; margin-top: 10px; background: #4CAF50; color: white; padding: 10px; border-radius: 8px; text-decoration: none; text-align: center;">Continue Journey</a>
</div>
{% elif success %}
<div class="menu-item" style="background: #4CAF50; color: white;">
    <i class="fas fa-check-circle"></i> Journey created!
    <a href="{{ redirect_url }}" style="display: block; margin-top: 10px; background: white; color: #4CAF50; padding: 10px; border-radius: 8px; text-decoration: none; text-align: center;">Start Now</a>
</div>
{% endif %}
