<button class="action-btn {% if user_following %}following{% endif %}" 
        onclick="toggleFollow({{ campaign.id }}, this)"
        id="follow-btn-{{ campaign.id }}">
    <i class="fas {% if user_following %}fa-check{% else %}fa-plus{% endif %}"></i>
    <span>{% if user_following %}Following{% else %}Follow{% endif %}</span>
</button>
