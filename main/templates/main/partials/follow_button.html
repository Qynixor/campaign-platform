<button class="action-btn follow-btn {% if user_following %}following{% endif %}"
        hx-post="{% url 'htmx_toggle_follow' campaign.id %}"
        hx-target="#follow-container-{{ campaign.id }}"
        hx-swap="outerHTML"
        hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <i class="fas {% if user_following %}fa-check{% else %}fa-plus{% endif %}"></i>
    <span>{% if user_following %}Following{% else %}Follow{% endif %}</span>
</button>
