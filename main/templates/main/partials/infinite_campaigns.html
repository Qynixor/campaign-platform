{% load static %}
{% for campaign in campaigns %}
    {% include "main/partials/campaign_card.html" with campaign=campaign %}
{% endfor %}

{% if has_more %}
<div class="infinite-scroll-sentinel" 
     hx-get="{% url 'journey' %}?infinite=true&offset={{ next_offset }}" 
     hx-trigger="intersect threshold:0.1" 
     hx-swap="afterend"
     hx-target="#campaignsContainer">
    <i class="fas fa-spinner fa-spin"></i>
</div>
{% endif %}
