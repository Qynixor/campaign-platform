<div style="padding: 20px;">
    <h3 style="color: white;">Boosts</h3>
    <p style="color: #aaa;">Total active boosts: {{ active_boosts|length }}</p>
    
    {% if active_boosts %}
        {% for boost in active_boosts %}
        <div style="background: #222; padding: 15px; margin: 10px 0; border-radius: 8px;">
            <strong style="color: white;">{{ boost.get_placement_type_display }}</strong>
            <div style="color: #aaa;">Impressions: {{ boost.impressions }} | Clicks: {{ boost.clicks }}</div>
        </div>
        {% endfor %}
    {% else %}
        <div style="background: #222; padding: 40px; text-align: center; border-radius: 8px;">
            <p style="color: #aaa;">No active boosts</p>
        </div>
    {% endif %}
</div>
