<button class="action-btn save-btn {% if saved %}saved{% endif %}"
        hx-post="{% url 'htmx_toggle_save' campaign.id %}"
        hx-target="#save-container-{{ campaign.id }}"
        hx-swap="outerHTML"
        hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <i class="{% if saved %}fas{% else %}far{% endif %} fa-bookmark"></i>
    <span>{{ save_count }}</span>
</button>
