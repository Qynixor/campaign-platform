{% extends 'base.html' %}
{% load static %}

{% block title %}Password Reset Complete | Rallynex{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        max-width: 430px;
        margin: 0 auto;
        background: #0a0a0a;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 40px 24px;
    }
    
    .auth-logo {
        text-align: center;
        margin-bottom: 32px;
        font-size: 28px;
        font-weight: 800;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    
    .auth-card {
        background: #111;
        border-radius: 20px;
        padding: 28px 24px;
        border: 1px solid #1a1a1a;
        text-align: center;
    }
    
    .check-icon {
        width: 56px;
        height: 56px;
        background: rgba(34, 197, 94, 0.1);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
        font-size: 24px;
        color: #22c55e;
    }
    
    .auth-card h2 {
        font-size: 22px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 8px;
    }
    
    .auth-card p {
        font-size: 14px;
        color: #888;
        margin-bottom: 24px;
    }
    
    .btn-login {
        display: inline-block;
        padding: 14px 40px;
        background: #fff;
        color: #0a0a0a;
        border-radius: 30px;
        font-size: 15px;
        font-weight: 700;
        text-decoration: none;
    }
    
    .btn-login:active {
        transform: scale(0.98);
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-logo">Rallynex</div>
    
    <div class="auth-card">
        <div class="check-icon">
            <i class="fas fa-check"></i>
        </div>
        <h2>Password reset complete</h2>
        <p>Your password has been changed. You can now log in with your new password.</p>
        <a href="{% url 'login' %}" class="btn-login">Log In</a>
    </div>
</div>
{% endblock %}
