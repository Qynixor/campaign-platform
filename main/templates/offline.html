{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Offline - Rallynex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .offline-container {
            text-align: center;
            max-width: 400px;
        }
        
        .offline-icon {
            font-size: 80px;
            margin-bottom: 24px;
            color: #3b82f6;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 12px;
        }
        
        p {
            color: #aaa;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        
        .btn {
            display: inline-block;
            padding: 14px 28px;
            background: #3b82f6;
            color: white;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .btn:hover {
            background: #2563eb;
            transform: scale(1.05);
        }
        
        .offline-footer {
            margin-top: 48px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <i class="fas fa-wifi-slash"></i>
        </div>
        <h1>You're Offline</h1>
        <p>Don't worry! You can still view previously loaded content. We'll automatically reconnect when your internet returns.</p>
        <a href="javascript:location.reload()" class="btn">Try Again</a>
        <div class="offline-footer">
            <p>Rallynex - Turn Content Into Structured Journeys</p>
        </div>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
