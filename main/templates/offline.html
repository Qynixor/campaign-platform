{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Rallynex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }
        
        .offline-container {
            text-align: center;
            max-width: 400px;
        }
        
        .offline-icon {
            font-size: 80px;
            margin-bottom: 24px;
            color: #3b82f6;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 16px;
        }
        
        p {
            color: #888;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        
        .retry-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .retry-btn:hover {
            background: #2563eb;
        }
        
        .cached-pages {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #222;
        }
        
        .cached-pages h3 {
            font-size: 16px;
            margin-bottom: 16px;
            color: #aaa;
        }
        
        .cached-link {
            display: block;
            color: #3b82f6;
            text-decoration: none;
            margin-bottom: 8px;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        
        .cached-link:hover {
            background: rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>You're Offline</h1>
        <p>Don't worry! You can still view previously visited pages and continue your journey once you're back online.</p>
        
        <button class="retry-btn" onclick="window.location.reload()">
            Try Again
        </button>
        
        <div class="cached-pages">
            <h3>Cached Pages (Available Offline)</h3>
            <a href="/" class="cached-link">🏠 Home</a>
            <a href="/discover/" class="cached-link">🔍 Discover</a>
            <a href="/dashboard/" class="cached-link">📊 Dashboard</a>
        </div>
    </div>
    
    <script>
        // Check if we're back online
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
