{% load custom_filters %}

<div class="section-header">
  <h2>
    <i class="fas fa-sparkles" style="color:#1DA1F2;"></i> 
    Fresh journeys
    <span class="section-badge">🆕 Just added</span>
  </h2>
</div>

<div class="content-grid">
  <div class="card-grid wide-grid">
    {% for campaign in campaigns %}
      {% if campaign.id %}
      <div class="wide-journey-card" data-category="{{ campaign.category|slugify }}" {% if user.is_authenticated %}data-campaign-id="{{ campaign.id }}"{% endif %}>
        <div class="wide-img" style="background-image: url('{% if campaign.poster %}{{ campaign.poster.url|cloudinary_optimize:'200,200' }}{% else %}https://images.unsplash.com/photo-1593113598335-c28859f6a0a6?w=200&h=200&fit=crop{% endif %}');"></div>
        <div class="wide-content">
          <div class="journey-title">{{ campaign.title|truncatechars:30 }}</div>
          <div class="journey-creator" style="margin:4px 0;">
            <img class="creator-avatar" 
                 src="{% if campaign.user.image %}{{ campaign.user.image.url }}{% else %}https://images.unsplash.com/photo-1527980965255-d3b416303d12?w=24&h=24&fit=crop{% endif %}" 
                 srcset="{% if campaign.user.image %}{{ campaign.user.image.url }} 2x{% endif %}"
                 alt="@{{ campaign.user.user.username }}" 
                 loading="lazy"
                 style="width: 24px; height: 24px;">
            <span>@{{ campaign.user.user.username }}</span>
          </div>
          <div class="journey-metrics" style="border:none; padding:0; margin-top: 8px;">
            <span><i class="fas fa-heart"></i> {{ campaign.love_count|default:0|k_format }}</span>
            <span><i class="fas fa-hourglass-start"></i> {{ campaign.timestamp|timesince }} ago</span>
          </div>
        </div>
      </div>
      {% endif %}
    {% endfor %}
  </div>
</div>

<div class="divider"></div>
